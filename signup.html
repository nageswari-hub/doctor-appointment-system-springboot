<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | MediConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #d4f1f9, #e8faff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .signup-container {
      background: linear-gradient(to bottom right, #ffffff, #f0faff);
      padding: 35px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.8s ease;
      border: 1px solid rgba(3, 169, 244, 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #0277bd;
      font-size: 26px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #cfd8dc;
      border-radius: 8px;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #03a9f4;
      outline: none;
      box-shadow: 0 0 6px rgba(3, 169, 244, 0.4);
    }

    button {
      background: linear-gradient(135deg, #03a9f4, #0288d1);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      box-shadow: 0 4px 10px rgba(2, 136, 209, 0.3);
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #0288d1, #0277bd);
    }

    p {
      margin-top: 15px;
      color: #2d3436;
    }

    a {
      color: #0277bd;
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <h1>Create Account</h1>
    <form id="signup-form" onsubmit="signupUser(event)">
      <input type="email" id="signup-email" placeholder="Email" required>
      <input type="password" id="signup-password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <!-- Firebase Libraries -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>

</body>
</html>
