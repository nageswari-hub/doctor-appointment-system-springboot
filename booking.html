<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Appointment</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #d4f1f9, #e8faff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .booking-container {
      background: linear-gradient(to bottom right, #ffffff, #f0faff);
      padding: 35px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
      text-align: center;
      animation: fadeIn 0.8s ease;
      border: 1px solid rgba(3, 169, 244, 0.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      color: #0277bd;
      font-size: 26px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-weight: 600;
      color: #2d3436;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #cfd8dc;
      border-radius: 8px;
      font-size: 15px;
      transition: 0.3s;
    }
    input:focus, select:focus {
      border-color: #03a9f4;
      outline: none;
      box-shadow: 0 0 6px rgba(3, 169, 244, 0.4);
    }
    button {
      background: linear-gradient(135deg, #03a9f4, #0288d1);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      box-shadow: 0 4px 10px rgba(2, 136, 209, 0.3);
    }
    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #0288d1, #0277bd);
    }
    #acknowledgement {
      margin-top: 15px;
      color: #0277bd;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.5s ease;
    }
  </style>
</head>
<body>

  <div class="booking-container">
    <h1>Book Your Appointment</h1>

    <form id="booking-form">
      <input type="hidden" id="doctor" name="doctor">
      <input type="hidden" id="doctor_email" name="doctor_email">

      <label for="doctor-select">Select Doctor</label>
      <select id="doctor-select" required>
        <option value="">-- Choose a Doctor --</option>
        <option value="Dr. Aarav Mehta" data-email="aaravmehta.md@gmail.com">Dr. Aarav Mehta (Cardiologist)</option>
        <option value="Dr. Priya Nair" data-email="priyanair.clinic@gmail.com">Dr. Priya Nair (Dermatologist)</option>
        <option value="Dr. Kavya Sharma" data-email="kavyasharma.ped@gmail.com">Dr. Kavya Sharma (Pediatrician)</option>
        <option value="Dr. Rohan Patel" data-email="rohanpatel.ortho@gmail.com">Dr. Rohan Patel (Orthopedic Surgeon)</option>
        <option value="Dr. Ananya Rao" data-email="ananyarao.neuro@gmail.com">Dr. Ananya Rao (Neurologist)</option>
        <option value="Dr. Vivek Menon" data-email="vivekmenon.md@gmail.com">Dr. Vivek Menon (General Physician)</option>
      </select>

      <label>Your Name</label>
      <input type="text" name="patient_name" placeholder="Enter your full name" required>

      <label>Your Email</label>
      <input type="email" name="patient_email" placeholder="example@email.com" required>

      <label>Your Phone</label>
      <input type="text" name="patient_phone" id="patient_phone" placeholder="Enter your phone number" required>

      <button type="submit">Book Doctor</button>
    </form>

    <p id="acknowledgement"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
  <script>
   emailjs.init("EJ14pUEqEvc4J2I5t");

    const form = document.getElementById("booking-form");
    const doctorSelect = document.getElementById("doctor-select");
    const doctorInput = document.getElementById("doctor");
    const doctorEmailInput = document.getElementById("doctor_email");
    const ack = document.getElementById("acknowledgement");

    doctorSelect.addEventListener("change", function() {
      const selectedOption = this.options[this.selectedIndex];
      doctorInput.value = selectedOption.value;
      doctorEmailInput.value = selectedOption.dataset.email;
    });

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const selectedDoctor = doctorSelect.value;

      emailjs.sendForm("service_wmvpl38", "template_h2aynf4", this)
        .then(() => {
          ack.innerText = `Your appointment with ${selectedDoctor} has been booked successfully!`;
          ack.style.display = "block";
          form.reset();
        })
        .catch((error) => {
          ack.innerText = "Something went wrong. Please try again later.";
          ack.style.color = "red";
          ack.style.display = "block";
          console.error(error);
        });
    });
  </script>

  <!-- ✅ Firebase Auth Protection -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCw-4v2oW7MSv_vdehKR4UNAS0INahiDU",
      authDomain: "your-health-our-priority.firebaseapp.com",
      projectId: "your-health-our-priority",
      storageBucket: "your-health-our-priority.firebasestorage.app",
      messagingSenderId: "678037019379",
      appId: "1:678037019379:web:91a3a1ec1a6f6c0efff586",
      measurementId: "G-CPHKRNWYV1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("⚠️ Please login first to book an appointment.");
        window.location.href = "login.html";
      } else {
        console.log("Logged in as:", user.email);
        document.querySelector('input[name="patient_email"]').value = user.email;
      }
    });
  </script>
  <!-- Firebase Auth -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<script>
  // Check if user is logged in
  checkAuth();
</script>

</body>
</html>
