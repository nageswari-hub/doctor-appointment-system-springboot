<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #d4f1f9, #e8faff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .feedback-container {
      background: linear-gradient(to bottom right, #ffffff, #f0faff);
      padding: 35px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
      text-align: center;
      animation: fadeIn 0.8s ease;
      border: 1px solid rgba(3, 169, 244, 0.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      color: #0277bd;
      font-size: 26px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-weight: 600;
      color: #2d3436;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #cfd8dc;
      border-radius: 8px;
      font-size: 15px;
      transition: 0.3s;
    }
    input:focus, textarea:focus {
      border-color: #03a9f4;
      outline: none;
      box-shadow: 0 0 6px rgba(3, 169, 244, 0.4);
    }
    button {
      background: linear-gradient(135deg, #03a9f4, #0288d1);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      box-shadow: 0 4px 10px rgba(2, 136, 209, 0.3);
    }
    button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #0288d1, #0277bd);
    }
    #feedback-msg {
      margin-top: 15px;
      color: #0277bd;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>

  <div class="feedback-container">
    <h1>Share Your Feedback</h1>

    <form id="feedback-form">
      <input type="hidden" name="doctor" id="doctor">
      <input type="hidden" name="doctor_email" id="doctor_email">

      <label>Your Name:</label>
      <input type="text" name="name" required>

      <label>Your Email:</label>
      <input type="email" name="email" required>

      <label>Feedback:</label>
      <textarea name="feedback" required></textarea>

      <button type="submit">Submit Feedback</button>
    </form>

    <p id="feedback-msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
  <script>
    emailjs.init("EJ14pUEqEvc4J2I5t");
    const form = document.getElementById("feedback-form");
    const msg = document.getElementById("feedback-msg");

    form.addEventListener("submit", function(event) {
      event.preventDefault();
      emailjs.sendForm("service_wmvpl38", "template_6l3mcf9", this)
        .then(() => {
          msg.innerText = "✅ Thank you for your feedback!";
          msg.style.display = "block";
          form.reset();
        })
        .catch(() => {
          msg.innerText = "⚠️ Failed to send feedback. Please try again.";
          msg.style.color = "red";
          msg.style.display = "block";
        });
    });
  </script>

  <!-- ✅ Firebase Auth Protection -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCw-4v2oW7MSv_vdehKR4UNAS0INahiDU",
      authDomain: "your-health-our-priority.firebaseapp.com",
      projectId: "your-health-our-priority",
      storageBucket: "your-health-our-priority.firebasestorage.app",
      messagingSenderId: "678037019379",
      appId: "1:678037019379:web:91a3a1ec1a6f6c0efff586",
      measurementId: "G-CPHKRNWYV1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("⚠️ Please login first to submit feedback.");
        window.location.href = "login.html";
      } else {
        document.querySelector('input[name="email"]').value = user.email;
      }
    });
  </script>
<!-- Firebase Auth -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<script>
  // Check if user is logged in
  checkAuth();
</script>

</body>
</html>
